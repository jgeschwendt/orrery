[tools]
elixir = "1.20.2-otp-28"
erlang = "28.5.0.2"

# No [env] MIX_ENV pin: dev is already mix's default, and pinning it broke `mix test`
# (compiled into _build/dev, where test/support is excluded → Web.ConnCase not found).

[tasks.dev]
description = "Start the Phoenix dev server (http://127.0.0.1:1024)"
run = "mix phx.server"
